spring.application.name=PhenylalanineCalculatorApi

logging.level.com.keldorn=debug
logging.level.org.springframework.boot.actuator.autoconfigure.opentelemetry=debug
logging.level.org.springframework.boot.docker.compose=debug

spring.profiles.active=db,secrets
spring.config.import=file:./local-config/

spring.jpa.hibernate.ddl-auto=validate

spring.liquibase.enabled=true
spring.liquibase.change-log=db/changelog/test-master.yaml